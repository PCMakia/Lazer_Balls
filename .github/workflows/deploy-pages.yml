# Build the game with pygbag and publish static files to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: python -m pip install --upgrade pip pygbag

      - name: Build web bundle
        run: python -m pygbag --build .

      # pygbag always emits the same filename (e.g. lazer_balls.apk). Browsers cache
      # that URL aggressively, so players keep an old bundle after deploy. Append the
      # commit id so each deploy requests a unique URL (same file on the server).
      - name: Cache-bust APK URL in index.html
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: python scripts/cache_bust_index_apk.py

      - uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
